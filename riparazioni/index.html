      function getTheme() {
        if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
          return localStorage.getItem('theme');
        }
        return 'auto';
      }
      function applyTheme(theme) {
        if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }
      applyTheme(getTheme());
    </script><style>:root{--bg-color: #f8f9fa;--text-color: #212529;--accent-color: #FF6700;--border-color: #dee2e6;--code-bg: #e9ecef;--card-bg: #ffffff;--font-mono: "Consolas", "Monaco", "Courier New", monospace;--font-sans: system-ui, -apple-system, sans-serif}html.dark{--bg-color: #0d1117;--text-color: #c9d1d9;--accent-color: #FF6700;--border-color: #30363d;--code-bg: #161b22;--card-bg: #0d1117}body{font-family:var(--font-sans);background-color:var(--bg-color);color:var(--text-color);line-height:1.7;max-width:800px;margin:0 auto;padding:2rem 1.5rem;font-size:1.05rem;transition:background-color .3s ease,color .3s ease}h1,h2,h3,nav{font-family:var(--font-mono);font-weight:400}h1{border-bottom:2px solid var(--accent-color);padding-bottom:.5rem;display:inline-block}nav{display:flex;gap:1.5rem;align-items:center;padding-bottom:1.5rem;border-bottom:1px dashed var(--border-color);margin-bottom:2.5rem;flex-wrap:wrap}nav a{color:var(--text-color);text-decoration:none;text-transform:uppercase;font-size:.9rem;letter-spacing:.05em}nav a:hover{color:var(--accent-color)}.theme-select{margin-left:auto;padding:.3rem .5rem;background:var(--card-bg);color:var(--text-color);border:1px solid var(--border-color);border-radius:4px;font-family:var(--font-mono);font-size:.8rem;cursor:pointer}a{color:var(--accent-color);text-decoration:none}a:hover{text-decoration:underline}img,video,iframe{max-width:100%;height:auto;border-radius:4px;border:1px solid var(--border-color);margin:1.5rem 0}pre,code{background-color:var(--code-bg);font-family:var(--font-mono);font-size:.9em;border-radius:4px}code{padding:.2em .4em}pre{padding:1rem;overflow-x:auto;border:1px solid var(--border-color)}.block-list{list-style:none;padding:0}.block-item{margin-bottom:1rem;background-color:var(--card-bg);border:1px solid var(--border-color);transition:border-color .2s ease,transform .2s ease}.block-item:hover{border-color:var(--accent-color);transform:translate(4px)}.block-item a{display:block;padding:1rem;color: </style></head> <body> <!-- Navigazione principale (navbar) --> <nav> <a href="/">Home</a> <a href="/progetti">Progetti</a> <a href="/riparazioni">Riparazioni</a> <select id="theme-selector" class="theme-select" aria-label="Cambia tema"> <option value="auto">Tema: Auto</option> <option value="light">Tema: Chiaro</option> <option value="dark">Tema: Scuro</option> </select> </nav> <main>   <h1>Archivio riparazioni</h1> <p>Elenco di alcune delle riparazioni e teardown svolti negli ultimi anni.</p> <ul class="block-list">  </ul>  </main> <script type="module">const a=document.getElementById("theme-selector"),c=localStorage.getItem("theme")||"auto";a.value=c;a.addEventListener("change",e=>{const t=e.target.value;localStorage.setItem("theme",t),t==="dark"||t==="auto"&&window.matchMedia("(prefers-color-scheme: dark)").matches?document.documentElement.classList.add("dark"):document.documentElement.classList.remove("dark")});window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",e=>{(localStorage.getItem("theme")==="auto"||!localStorage.getItem("theme"))&&(e.matches?document.documentElement.classList.add("dark"):document.documentElement.classList.remove("dark"))});</script> </body> </html>
